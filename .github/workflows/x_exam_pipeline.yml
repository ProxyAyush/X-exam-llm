name: X-Exam Adversarial Reasoning Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Run in baseline mode'
        required: false
        default: 'false'

concurrency:
  group: x-exam-research
  cancel-in-progress: false

jobs:
  run-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run X-Exam Controller
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_AYUSHI: ${{ secrets.GROQ_API_KEY_AYUSHI }}
          GROQ_API_KEY_AKAAKA: ${{ secrets.GROQ_API_KEY_AKAAKA }}
        run: |
          # 1. Check for missing Phase 3 items
          python src/identify_missing.py
          MISSING_COUNT=$(python -c "import json; m=json.load(open('analysis/missing_indices.json')); print(sum(len(v) for v in m.values()))")
          
          if [[ "$MISSING_COUNT" -gt 0 ]]; then
            echo "Phase 3 is INCOMPLETE ($MISSING_COUNT items missing). Starting Backfill."
            python -u src/backfill_phase3.py
          else
            echo "Phase 3 is 100% COMPLETE. Running Phase 4 (Baseline Mode)."
            python -u src/controller.py --baseline
          fi

      - name: Robust Save to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage changes individually to avoid pathspec errors
          git add results || echo "Results dir missing"
          git add results_baseline || echo "Baseline dir missing"
          git add state.json || echo "state.json missing"
          git add state_baseline.json || echo "state_baseline.json missing"
          git add analysis || echo "analysis missing"
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update research data [skip ci]"
            
            # Use aggressive rebase to force the save through
            # This handles cases where other runners or users updated the repo
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || sleep 10
            done
          fi
