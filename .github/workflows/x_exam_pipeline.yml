name: X-Exam Adversarial Reasoning Pipeline

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Run in baseline mode'
        required: false
        default: 'false'

concurrency:
  group: x-exam-research
  cancel-in-progress: false

jobs:
  run-inference:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run X-Exam Controller
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_AYUSHI: ${{ secrets.GROQ_API_KEY_AYUSHI }}
          GROQ_API_KEY_AKAAKA: ${{ secrets.GROQ_API_KEY_AKAAKA }}
        run: |
          if [[ "${{ github.event.inputs.baseline }}" == "true" ]]; then
            python -u src/controller.py --baseline
          else
            python -u src/controller.py
          fi

      - name: Robust Save to GitHub
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # Stage changes
          git add results results_baseline state.json state_baseline.json || echo "Some files missing, continuing..."
          
          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-update research data [skip ci]"
            
            # Use aggressive rebase to force the save through
            # This handles cases where other runners or users updated the repo
            for i in {1..5}; do
              git pull --rebase origin main && git push origin main && break || sleep 10
            done
          fi
